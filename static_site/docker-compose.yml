services:
  static_site:
    image: nginx:alpine
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      SITE_NAME: ${SITE_NAME:-${DOMAIN}}
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.static_site.rule=Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.static_site.entrypoints=websecure"
      - "traefik.http.routers.static_site.tls.certresolver=${CERT_RESOLVER:-}"
    networks:
      - proxy

networks:
  proxy:
    external: true
