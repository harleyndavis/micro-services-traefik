services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file:
      - ../.env
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # High-priority router: catches API, admin, redirects, and static assets.
      # The shortener-ui router in static_site/docker-compose.yml catches everything else.
      - "traefik.http.routers.shortener-api.rule=Host(`short.${DOMAIN}`) && (PathPrefix(`/api/`) || PathPrefix(`/admin/`) || PathPrefix(`/s/`) || PathPrefix(`/static/`))"
      - "traefik.http.routers.shortener-api.entrypoints=websecure"
      - "traefik.http.routers.shortener-api.tls=true"
      - "traefik.http.routers.shortener-api.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.routers.shortener-api.priority=10"
      - "traefik.http.services.shortener.loadbalancer.server.port=8000"
    volumes:
      - ./:/app
      - staticfiles:/app/staticfiles
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 shortener.wsgi:application"

volumes:
  postgres_data:
  staticfiles:

networks:
  proxy:
    external: true
