services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file:
      - ../.env
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shortener.rule=Host(`short.${DOMAIN}`)"
      - "traefik.http.routers.shortener.entrypoints=websecure"
      - "traefik.http.routers.shortener.tls=true"
      - "traefik.http.routers.shortener.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.services.shortener.loadbalancer.server.port=8000"
    volumes:
      - ./:/app
      - staticfiles:/app/staticfiles
      - ../static_site/html/_partials:/app/templates/partials:ro
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --timeout 120 shortener.wsgi:application"

volumes:
  postgres_data:
  staticfiles:

networks:
  proxy:
    external: true
