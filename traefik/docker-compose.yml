services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    networks:
      # Connect to the 'traefik_proxy' overlay network for inter-container communication across nodes
      - proxy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ./dynamic:/dynamic:ro
      - ./letsencrypt:/letsencrypt

    command:
      # EntryPoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"

      # Attach the static configuration tls.yaml file that contains the tls configuration settings
      - "--providers.file.filename=/dynamic/tls.yaml"

      # Providers 
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"

      # TLS Certificate Resolver — Let's Encrypt
      # Set ACME_EMAIL and CERT_RESOLVER=letsencrypt in .env for production.
      # Leave both empty for local dev (file-provider certs from ./certs are used instead).
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"

      # API & Dashboard 
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # Observability 
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"

    # Traefik Dynamic configuration via Docker labels
    labels:
      # Enable self‑routing
      - "traefik.enable=true"

      # Dashboard router
      - "traefik.http.routers.dashboard.rule=(Host(`dashboard.${TRAEFIK_DASHBOARD_HOST:-localhost}`) || (Host(`${TRAEFIK_DASHBOARD_HOST:-localhost}`)) && (PathPrefix(`/dashboard/`) || PathPrefix(`/api`)))"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=${CERT_RESOLVER:-}"

      # Redirect /dashboard to /dashboard/
      - "traefik.http.routers.dashboard-redirect.rule=(Host(`${TRAEFIK_DASHBOARD_HOST:-localhost}`)) && Path(`/dashboard`)"
      - "traefik.http.routers.dashboard-redirect.entrypoints=websecure"
      - "traefik.http.routers.dashboard-redirect.tls=true"
      - "traefik.http.routers.dashboard-redirect.service=noop@internal"
      - "traefik.http.routers.dashboard-redirect.middlewares=dashboard-slash@docker"
      - "traefik.http.middlewares.dashboard-slash.redirectregex.regex=^https://([^/]+)/dashboard$"
      - "traefik.http.middlewares.dashboard-slash.redirectregex.replacement=https://$${1}/dashboard/"
      - "traefik.http.middlewares.dashboard-slash.redirectregex.permanent=true"

      # Basic‑auth middleware
      - "traefik.http.middlewares.dashboard-auth.basicauth.usersfile=/dynamic/dashboard-users.htpasswd"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth@docker"

  # Whoami application — only started when the "dev" profile is active
  whoami:
    image: traefik/whoami
    container_name: whoami
    restart: unless-stopped
    profiles: [dev]
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=(Host(`whoami.${TRAEFIK_DASHBOARD_HOST:-localhost}`) || (Host(`${TRAEFIK_DASHBOARD_HOST:-localhost}`)) && PathPrefix(`/whoami`))"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls=true"
      - "traefik.http.routers.whoami.tls.certresolver=${CERT_RESOLVER:-}"

networks:
  proxy:
    name: proxy
